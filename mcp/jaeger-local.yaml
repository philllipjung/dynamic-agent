service:
  extensions: [jaeger_storage, jaeger_query, jaeger_mcp]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]

extensions:
  jaeger_query:
    storage:
      traces: opensearch_trace_storage
      metrics: opensearch_metrics_storage

  jaeger_storage:
    backends:
      opensearch_trace_storage: &opensearch_config
        opensearch:
          server_urls:
            - http://192.168.201.166:9200
    metric_backends:
      opensearch_metrics_storage:
        opensearch:
          server_urls:
            - http://192.168.201.166:9200

  jaeger_mcp:
    # HTTP endpoint for MCP protocol (Streamable HTTP transport)
    http:
      endpoint: "0.0.0.0:16687"
    
    # Server identification for MCP protocol
    server_name: "jaeger"
    # server_version will default to the build version
    
    # Limits
    max_span_details_per_request: 20
    max_search_results: 100
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: opensearch_trace_storage
