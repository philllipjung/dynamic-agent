# Agent Server Configuration
server.port=8080

# Arthas Configuration
arthas.tunnel.server.host=127.0.0.1
arthas.tunnel.server.port=8563
arthas.home=${user.home}/.arthas

# OpenSearch/Elasticsearch Configuration
opensearch.host=http://localhost:9200
opensearch.index.pattern=jaeger-span-*

# OpenTelemetry Configuration
opentelemetry.service.name=java-agent
opentelemetry.exporter.jaeger.endpoint=http://localhost:14250
opentelemetry.exporter.jaeger.protocol=grpc

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
